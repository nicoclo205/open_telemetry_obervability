apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: observabilidad
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:latest
          imagePullPolicy: Always
          args:
            - --config=/etc/otel/collector-config.yaml
          ports:
            - containerPort: 4317
            - containerPort: 4318
            - containerPort: 8888
          env:
            - name: NEW_RELIC_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: observabilidad-secrets
                  key: NEW_RELIC_LICENSE_KEY
          resources:
            limits:
              memory: 256Mi
              cpu: 250m
          volumeMounts:
            - name: otel-collector-config
              mountPath: /etc/otel/collector-config.yaml
              subPath: collector-config.yaml
      volumes:
        - name: otel-collector-config
          configMap:
            name: otel-collector-config
